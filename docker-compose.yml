version: '3.8'
services:
  db:
    image: postgres:15
    container_name: finance-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-financedb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: finance-backend
    restart: always
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://db:5432/${DB_NAME:-financedb}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      # Critical Security Variables (Must be secure in .env)
      - JWT_SECRET=${JWT_SECRET:-your_super_secret_key_that_is_at_least_256_bits_long_for_hs256}
      - JWT_EXPIRATION_MS=${JWT_EXPIRATION_MS:-86400000}

volumes:
  postgres_data:
